# CI/CD: every push and PR is linted, typechecked, and tested.
#
# ─────────────────────────────────────────────────────────────────────
#  ⚠ DEPLOYS TEMPORARILY DISABLED — both deploy jobs carry `if: false`.
#  Re-enable by restoring `if: github.event_name != 'pull_request'`
#  on each, after the one-time Cloudflare setup:
#    1. Repo secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
#    2. npx wrangler pages project create pratul-portfolio
#    3. npx wrangler d1 create portfolio-contact-book
#       → paste the id into wrangler.jsonc, then npm run db:migrate:remote
# ─────────────────────────────────────────────────────────────────────
#
# All actions here are Node 24-native (checkout@v5, setup-node@v5,
# upload-artifact@v5, download-artifact@v6). Cloudflare deploys call the
# Wrangler CLI from our own lockfile instead of cloudflare/wrangler-action,
# which still targets the deprecated Node 20 runtime.

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm run typecheck

      # pretest builds the static export, then the suite asserts on it.
      - run: npm test

      - name: Share build with deploy jobs
        uses: actions/upload-artifact@v5
        with:
          name: site-dist
          path: out
          retention-days: 7

  deploy-workers:
    name: Deploy to Cloudflare Workers
    needs: test
    if: false # TEMP disabled — restore: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Wrangler comes from the lockfile — same version as local dev.
      - run: npm ci

      - uses: actions/download-artifact@v6
        with:
          name: site-dist
          path: out

      # Schema first, then code that expects it.
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply portfolio-contact-book --remote

      - name: Deploy Worker + static assets
        run: npx wrangler deploy

  deploy-pages:
    name: Deploy to Cloudflare Pages (fallback)
    needs: test
    if: false # TEMP disabled — restore: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v6
        with:
          name: site-dist
          path: out

      - name: Deploy static fallback
        run: npx wrangler pages deploy out --project-name=pratul-portfolio --branch=main --commit-dirty=true
